name: Cellarcount
options:
  bundleIdPrefix: com.shimondeitel.winespend
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Cellarcount:
    type: application
    platform: iOS
    sources:
      - path: Cellarcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winespend
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cellarcount/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CellarcountTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CellarcountTests
    dependencies:
      - target: Cellarcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winespend.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CellarcountUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CellarcountUITests
    dependencies:
      - target: Cellarcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winespend.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Cellarcount:
    build:
      targets:
        Cellarcount: all
        CellarcountTests: [test]
        CellarcountUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Cellarcount.storekit
    test:
      config: Debug
      storeKitConfiguration: Cellarcount.storekit
      targets:
        - CellarcountTests
        - CellarcountUITests
    archive:
      config: Release
